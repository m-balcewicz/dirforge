---
# Journal World Help (Canonical)
# Version: 1.2.0
# Constitution: §III.VI Journal Activities

command: "dirforge init journal | dirforge create journal"
world_type: "JOURNAL_WORLD"
schema_version: "1.2.0"
type: "world-help"
category: "world"

syntax: |
  dirforge init journal --name "Paper Name" --first [--year YYYY]
  dirforge init journal --name "Paper Name" --coauthor [--year YYYY]
  dirforge init journal --name "Journal Name" --id "MANUSCRIPT_ID" --service
  dirforge create journal <subtype> [options]
  dirforge journal --help
  dirforge init journal --help
  dirforge create journal --help

short_help:
  summary: "Create journal workflows for authorship, review, and editorial service"
  usage: 'dirforge init journal --name "Paper Name" --first'

long_help:
  summary: |
    JOURNAL_WORLD help is canonical for both init and create entry points.
    It covers publication lifecycle workflows from manuscript drafting through
    service duties such as peer review and editorial communication.
  details: |
    Use journal subtypes for role-based creation with create journal, while
    init journal remains available for direct workflow initialization.
  important_notes:
    - Journal IDs should be stable and searchable.
    - Sensitive peer-review files should use restricted access.

description: |
  Creates journal project for managing all aspects of academic publishing: your own 
  manuscript submissions, reviewer assignments, editorial responsibilities, and 
  journal-related correspondence. Flexible structure supports diverse workflows 
  and use cases.

sections:
  optional_options:
    title: "Options"
    content: |
      --name "name"                   Paper name (authorship) or journal name (service)
      --id "identifier"               Manuscript identifier (required with --service)
      --first                          Primary authorship workflow
      --coauthor                       Co-author workflow
      --service                        Journal service workflow
      --year YYYY                      Year for authorship workflows
  
  directory_structures:
    title: "Directory Structures"
    content: |
      JOURNAL_WORLD/JOURNAL_NAME/ID/
      ├── manuscript/                 Papers, drafts, revisions
      ├── reviews/                    Peer reviews, comments, responses
      └── correspondence/             Editorial communications

  role_subtypes:
    title: "Role Subtypes"
    content: |
      primary                         Lead/corresponding authorship workflows
      coauthor                        Collaborative writing workflows
      service                         Reviewer/editorial service workflows

examples:
  - title: "Your manuscript submission"
    command: 'dirforge init journal --name "thermal_analysis" --first --year 2025'
    description: "Tracks your manuscript submission progress"
  
  - title: "Reviewer work"
    command: 'dirforge init journal --name "joint_study" --coauthor --year 2024'
    description: "Organizes batch of papers to review"
  
  - title: "Editorial responsibilities"
    command: 'dirforge init journal --name "JGR Solid Earth" --id "EDITORIAL_BOARD_2024" --service'
    description: "Manages associate editor duties"
  
  - title: "Special issue coordination"
    command: 'dirforge create journal service --journal "IEEE TGRS" --id "SPECIAL_ISSUE_ML"'
    description: "Coordinates special issue editing"

use_cases:
  - "Your submissions: manuscript drafts and revisions"
  - "Reviewer work: papers to review and your reviews"
  - "Editorial duties: special issues, associate editor work"
  - "Conference abstracts and journal correspondence"

related_commands:
  - "dirforge init"
  - "dirforge init research"

see_also:
  - "Constitution §III.VI - Journal Activities"
  - "docs/yaml-config-user-guide.md - Configuration system"

constitution_section: "§III.VI"
updated: "2026-06-19"
