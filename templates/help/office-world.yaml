# Office World Help (Canonical)
# Version: 1.2.0
# Constitution: §III.III Administrative Documents

command: "dirforge init office"
world_type: "OFFICE_WORLD"
schema_version: "1.2.0"
type: "world-help"
category: "world"

syntax: |
  dirforge init office [options]
  dirforge init office --help

short_help:
  summary: "Create administrative project for business documents and management"
  usage: "dirforge init office"

long_help:
  summary: |
    OFFICE_WORLD help defines standardized administrative structure for finance,
    HR, equipment, software licensing, and communication workflows.
  details: |
    Use this world for institution-facing operations where auditability,
    document lifecycle control, and stable folder conventions are needed.
  important_notes:
    - Place sensitive records under restricted filesystem permissions.
    - Keep archival documents in 90_archive with clear date prefixes.

description: |
  Creates administrative project for business documents, contracts, finance 
  tracking, equipment management, and organizational workflows.

sections:
  optional_options:
    title: "Optional Options"
    content: |
      --dry-run                      Preview structure without creating files
      --force                        Overwrite existing structure when applicable

  naming_conventions:
    title: "Naming Conventions"
    content: |
      Use lowercase snake_case for subfolders and document names.
      Suggested file prefix format: YYYY-MM-DD_subject

  directory_structures:
    title: "Directory Structures"
    content: |
      OFFICE_WORLD/
      ├── 00_admin/                   Administrative files
      ├── 01_finance/                 Financial documents and tracking
      ├── 02_hr_administration/       Human resources
      ├── 03_faculty/                 Faculty-related documents
      ├── 04_inventory_equipment/     Equipment and inventory
      ├── 05_software_licenses/       Software licensing
      ├── 06_public_relations/        PR and communications
      └── 90_archive/                 Archived documents

examples:
  - title: "Budget tracking"
    command: "dirforge init office"
    description: "Creates office structure for financial management"
  
  - title: "Equipment inventory"
    command: "dirforge init office"
    description: "Use 04_inventory_equipment/ for equipment management"
  
  - title: "Contract management"
    command: "dirforge init office"
    description: "Use 00_admin/ or 01_finance/ for contracts"

related_commands:
  - "dirforge init"
  - "dirforge init private"

see_also:
  - "Constitution §III.III - Administrative Documents"
  - "docs/yaml-config-user-guide.md - Configuration system"

constitution_section: "§III.III"
